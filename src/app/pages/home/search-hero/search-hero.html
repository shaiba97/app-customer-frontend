<section
  id="search-hero"
  dir="rtl"
  class="relative w-full overflow-hidden
         bg-gradient-to-bl
         from-[var(--primary)]
         via-[var(--primary-hover)]
         to-[var(--primary)]
         pt-14 pb-20 px-4 md:px-8 lg:px-16">

    <div class="absolute -top-24 -left-24
                w-96 h-96 rounded-full
                border-[60px] border-white/10
                pointer-events-none">
    </div>

    <div class="absolute -bottom-16 -right-16
                w-72 h-72 rounded-full
                border-[40px] border-white/10
                pointer-events-none">
    </div>

    <div class="absolute inset-0 opacity-[0.07]
                pointer-events-none"
        style="background-image:
          radial-gradient(circle, white 1px,
          transparent 1px);
          background-size: 32px 32px;">
    </div>

    <div class="relative z-10 max-w-5xl mx-auto">

      <div class="mb-8">
        <h1 class="text-3xl md:text-4xl font-extrabold
                  text-white leading-snug mb-2
                  drop-shadow-sm">
          احجز تذكرة حافلتك أونلاين
        </h1>
        <p class="text-white/75 text-sm md:text-base
                  font-medium">
          أسهل طريقة للسفر في السودان — بكل أمان وراحة
        </p>
      </div>

      <div class="flex flex-wrap items-center gap-2 mb-4">
        @for (pill of datePills(); track pill.date) {
          <button type="button" (click)="selectDatePill(pill)"
            class="px-4 py-2 rounded-xl text-xs font-bold transition-all active:scale-95 border-2"
            [class.bg-[var(--primary)]]="date() === pill.date"
            [class.text-white]="date() === pill.date"
            [class.border-[var(--primary)]]="date() === pill.date"
            [class.bg-[var(--bg-card)]]="date() !== pill.date"
            [class.text-[var(--text-secondary)]]="date() !== pill.date"
            [class.border-[var(--border)]]="date() !== pill.date"
            [class.hover:border-[var(--primary)]]="date() !== pill.date">
            {{ pill.label }}
          </button>
        }
      </div>

      <div class="flex flex-col md:flex-row
                  items-stretch
                  bg-[var(--bg-card)]
                  rounded-2xl
                  shadow-[0_8px_40px_rgba(0,0,0,0.25)]
                  overflow-hidden
                  min-h-[68px]">

        <div class="flex items-center gap-3
                    flex-1 px-5 py-4
                    border-b md:border-b-0
                    md:border-l
                    border-[var(--border)]
                    hover:bg-[var(--primary-light)]
                    transition-all duration-150
                    group">
          <svg lucideBus
              class="w-5 h-5 flex-shrink-0
                      text-[var(--primary)]">
          </svg>
          <div class="flex flex-col gap-0.5 flex-1">
            <span class="text-[9px] font-bold
                        text-[var(--text-secondary)]
                        uppercase tracking-widest">
              من
            </span>
            <app-city-select
              #fromCitySelect
              [placeholder]="'مدينة المغادرة'"
              [allCities]="cities()"
              [(value)]="from">
            </app-city-select>
          </div>
        </div>

        <div class="flex items-center justify-center
                    px-3 flex-shrink-0
                    border-b md:border-b-0
                    md:border-l border-[var(--border)]
                    py-3 md:py-0">
          <button
            type="button"
            (click)="swap()"
            class="w-9 h-9 rounded-full
                  border-2 border-[var(--border)]
                  flex items-center justify-center
                  bg-[var(--bg-card)]
                  text-[var(--text-secondary)]
                  hover:bg-[var(--primary)]
                  hover:border-[var(--primary)]
                  hover:text-white
                  transition-all duration-200
                  active:scale-90">
            <svg lucideArrowLeftRight
                class="w-4 h-4">
            </svg>
          </button>
        </div>

        <div class="flex items-center gap-3
                    flex-1 px-5 py-4
                    border-b md:border-b-0
                    md:border-l border-[var(--border)]
                    hover:bg-[var(--primary-light)]
                    transition-all duration-150">
          <svg lucideBus
              class="w-5 h-5 flex-shrink-0
                      text-[var(--primary)]">
          </svg>
          <div class="flex flex-col gap-0.5 flex-1">
            <span class="text-[9px] font-bold
                        text-[var(--text-secondary)]
                        uppercase tracking-widest">
              إلى
            </span>
            <app-city-select
              #toCitySelect
              [placeholder]="'مدينة الوصول'"
              [allCities]="cities()"
              [(value)]="to">
            </app-city-select>
          </div>
        </div>

        <div class="flex items-center gap-3
                    flex-1 px-5 py-4
                    border-b md:border-b-0
                    md:border-l border-[var(--border)]
                    hover:bg-[var(--primary-light)]
                    transition-all duration-150">
          <svg lucideCalendar
              class="w-5 h-5 flex-shrink-0
                      text-[var(--primary)]">
          </svg>
          <div class="flex flex-col gap-0.5 flex-1">
            <span class="text-[9px] font-bold
                        text-[var(--text-secondary)]
                        uppercase tracking-widest">
              تاريخ السفر
            </span>
            <input
              type="date"
              [ngModel]="date()"
              (ngModelChange)="date.set($event)"
              [min]="today"
              class="bg-transparent border-none
                    outline-none w-full
                    text-sm font-semibold
                    text-[var(--text-primary)]
                    cursor-pointer">
          </div>
        </div>

        <button
          type="button"
          (click)="onSearch()"
          [disabled]="isLoading()"
          class="flex items-center justify-center
                gap-3 px-8 py-4
                bg-[var(--primary)]
                hover:bg-[var(--primary-hover)]
                disabled:opacity-60
                disabled:cursor-not-allowed
                text-white font-bold text-sm
                uppercase tracking-wider
                transition-all duration-150
                active:scale-[0.98]
                min-w-[160px] flex-shrink-0
                w-full md:w-auto">
          @if (isLoading()) {
            <svg lucideLoaderCircle
                class="w-5 h-5 animate-spin">
            </svg>
            <span>جاري البحث...</span>
          } @else {
            <svg lucideSearch class="w-5 h-5">
            </svg>
            <span>ابحث عن رحلة</span>
          }
        </button>

      </div>

      @if (error()) {
        <p class="mt-3 text-white/90 text-sm
                  font-medium bg-white/10
                  rounded-xl px-4 py-2
                  inline-block">
          {{ error() }}
        </p>
      }

      <div class="flex flex-wrap items-center
                  gap-x-5 gap-y-2 mt-5">
        <span class="text-white/60 text-xs
                    font-medium flex-shrink-0">
          وجهات شائعة:
        </span>
        @for (route of popularRoutes; track route.from) {
          <button
            (click)="selectRoute(route.from, route.to)"
            class="flex items-center gap-1
                  text-white/80 text-xs font-medium
                  hover:text-white
                  border-b border-white/30
                  hover:border-white
                  transition-all duration-150
                  pb-px">
            <svg lucideMapPin class="w-3 h-3">
            </svg>
            <span>{{ route.from }}</span>
            <span class="text-white/50">←</span>
            <span>{{ route.to }}</span>
          </button>
        }
      </div>

    </div>
  
</section>
