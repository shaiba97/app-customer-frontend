<footer class="w-full bg-[var(--bg-card)] border-t border-[var(--border)] px-16 pt-12 pb-8" dir="rtl">
  <div class="max-w-6xl mx-auto">
    <div class="flex justify-end gap-16 mb-10">
      <div class="flex flex-col items-end gap-4 max-w-xs">
        <div class="flex items-center gap-2.5">
          <img src="/customerLogo.png" class="w-8 h-8" alt="رحلة">
          <span class="text-xl font-extrabold text-[var(--primary)]">رحلة</span>
        </div>
        <p class="text-sm text-[var(--primary)] text-right leading-relaxed">
          المنصة الرائدة في السودان لحجز تذاكر الحافلات والرحلات البرية بكل سهولة وأمان.
        </p>
      </div>
      <div class="flex flex-col items-end gap-3">
        <h4 class="text-sm font-bold text-[var(--text-primary)] mb-1">الدعم</h4>
        @for (link of supportLinks; track link.path) {
          <a [routerLink]="link.path" class="text-sm text-[var(--primary)] hover:underline transition-all">
            {{ link.label }}
          </a>
        }
      </div>
    </div>
    <div class="h-px bg-[var(--border)] mb-6"></div>
    <p class="text-xs text-[var(--primary)] text-center">
      © {{ currentYear }} رحلة (Rihla). جميع الحقوق محفوظة.
    </p>
  </div>
</footer>
