<div dir="rtl" class="h-screen overflow-hidden bg-[var(--bg-base)] flex flex-col">
  <div class="bg-[var(--bg-card)] px-4 py-3 border-b border-[var(--border)] flex items-center gap-3 flex-shrink-0">
    <button (click)="goBack()" class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-[var(--bg-base)]">
      <svg lucideArrowRight class="w-5 h-5 text-[var(--text-primary)]"></svg>
    </button>
    <span class="text-[16px] font-bold text-[var(--text-primary)]">إنشاء حساب</span>
  </div>

  <div class="flex-1 flex flex-col items-center justify-center px-6 gap-6">
    <div class="flex flex-col items-center gap-3">
      <div class="w-14 h-14 rounded-full bg-[var(--primary-light)] flex items-center justify-center">
        <svg lucideUserPlus class="w-7 h-7 text-[var(--primary)]"></svg>
      </div>
      <h1 class="text-xl font-extrabold text-[var(--text-primary)]">إنشاء حساب جديد</h1>
      <p class="text-sm text-[var(--text-secondary)] text-center">أدخل بياناتك لإنشاء حساب</p>
    </div>

    <div class="flex flex-col gap-4 w-full max-w-sm">
      <div class="flex items-center gap-3 px-4 py-3.5 rounded-2xl border border-[var(--border)] bg-[var(--bg-card)]">
        <svg lucideUser class="w-5 h-5 text-[var(--text-secondary)] flex-shrink-0"></svg>
        <input type="text" [ngModel]="name()" (ngModelChange)="name.set($event)" placeholder="الاسم الكامل" class="flex-1 bg-transparent outline-none text-[15px] font-semibold text-[var(--text-primary)] placeholder:text-[var(--text-secondary)] placeholder:font-normal">
      </div>

      <div class="flex items-center gap-3 px-4 py-3.5 rounded-2xl border border-[var(--border)] bg-[var(--bg-card)]">
        <svg lucidePhone class="w-5 h-5 text-[var(--text-secondary)] flex-shrink-0"></svg>
        <input type="text" [ngModel]="identifier()" (ngModelChange)="identifier.set($event)" placeholder="رقم الهاتف أو البريد الإلكتروني" class="flex-1 bg-transparent outline-none text-[15px] font-semibold text-[var(--text-primary)] placeholder:text-[var(--text-secondary)] placeholder:font-normal">
      </div>

      <div class="flex items-center gap-3 px-4 py-3.5 rounded-2xl border border-[var(--border)] bg-[var(--bg-card)]">
        <svg lucideLock class="w-5 h-5 text-[var(--text-secondary)] flex-shrink-0"></svg>
        <input type="password" [ngModel]="password()" (ngModelChange)="password.set($event)" placeholder="كلمة المرور" class="flex-1 bg-transparent outline-none text-[15px] font-semibold text-[var(--text-primary)] placeholder:text-[var(--text-secondary)] placeholder:font-normal">
      </div>

      <label class="flex items-start gap-3 cursor-pointer group">
        <input type="checkbox" [ngModel]="agreedToTerms()" (ngModelChange)="agreedToTerms.set($event)" class="peer sr-only">
        <div class="w-5 h-5 rounded-md border-2 border-[var(--border)] bg-[var(--bg-card)] peer-checked:bg-[var(--primary)] peer-checked:border-[var(--primary)] transition-all duration-150 flex items-center justify-center flex-shrink-0 mt-0.5">
          <svg class="w-3 h-3 text-white opacity-0 peer-checked:opacity-100 transition-opacity" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="20 6 9 17 4 12"></polyline>
          </svg>
        </div>
        <span class="text-sm text-[var(--text-secondary)] leading-relaxed">
          أوافق على
          <a routerLink="/terms" class="text-[var(--primary)] font-bold hover:underline">الشروط والأحكام</a>
          و
          <a routerLink="/terms" class="text-[var(--primary)] font-bold hover:underline">سياسة الخصوصية</a>
        </span>
      </label>

      @if (error()) {
        <p class="text-sm text-red-500 font-semibold text-center">{{ error() }}</p>
      }

      <button (click)="submit()" [disabled]="isLoading()" class="flex items-center justify-center gap-2 w-full py-4 rounded-2xl bg-[var(--primary)] text-white font-bold text-[15px] active:scale-[0.98] transition-all duration-150 shadow-lg disabled:opacity-60 disabled:cursor-not-allowed">
        @if (isLoading()) {
          <svg class="animate-spin w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
        } @else {
          <svg lucideUserPlus class="w-5 h-5"></svg>
        }
        <span>{{ isLoading() ? 'جاري إنشاء الحساب...' : 'إنشاء حساب' }}</span>
      </button>

      <div class="text-center">
        <span class="text-[13px] text-[var(--text-secondary)]">لديك حساب بالفعل؟ </span>
        <a (click)="goToLogin()" class="text-[13px] font-bold text-[var(--primary)] cursor-pointer">تسجيل الدخول</a>
      </div>
    </div>
  </div>
</div>
