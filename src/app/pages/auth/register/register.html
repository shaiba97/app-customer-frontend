<div dir="rtl" class="min-h-screen bg-[var(--bg-base)] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md">
    <div class="bg-[var(--bg-card)] rounded-3xl shadow-[0_8px_40px_var(--shadow)] border border-[var(--border)] p-8 md:p-10">
      <div class="flex flex-col items-center gap-4 mb-8">
        <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-[var(--primary)] to-[var(--primary-hover)] flex items-center justify-center shadow-lg">
          <svg lucideBus class="w-8 h-8" color="white"></svg>
        </div>
        <h1 class="text-2xl font-extrabold text-[var(--text-primary)]">إنشاء حساب جديد</h1>
        <p class="text-sm text-[var(--text-muted)] text-center">أدخل بياناتك لإنشاء حساب والبدء في حجز تذاكرك</p>
      </div>

      <div class="flex flex-col gap-5">
        <div class="flex items-center gap-3 px-4 py-4 rounded-2xl border border-[var(--border)] bg-[var(--bg-base)] transition-all duration-200 focus-within:border-[var(--primary)] focus-within:shadow-[0_0_0_3px_var(--primary-light)]">
          <svg lucideUser class="w-5 h-5 text-[var(--text-muted)] flex-shrink-0"></svg>
          <input type="text" [ngModel]="name()" (ngModelChange)="name.set($event)" placeholder="الاسم الكامل" class="flex-1 bg-transparent outline-none text-[15px] font-semibold text-[var(--text-primary)] placeholder:text-[var(--text-muted)] placeholder:font-normal">
        </div>

        <div class="flex items-center gap-3 px-4 py-4 rounded-2xl border border-[var(--border)] bg-[var(--bg-base)] transition-all duration-200 focus-within:border-[var(--primary)] focus-within:shadow-[0_0_0_3px_var(--primary-light)]">
          <svg lucidePhone class="w-5 h-5 text-[var(--text-muted)] flex-shrink-0"></svg>
          <input type="text" [ngModel]="identifier()" (ngModelChange)="identifier.set($event)" placeholder="رقم الهاتف أو البريد الإلكتروني" class="flex-1 bg-transparent outline-none text-[15px] font-semibold text-[var(--text-primary)] placeholder:text-[var(--text-muted)] placeholder:font-normal">
        </div>

        <div class="flex items-center gap-3 px-4 py-4 rounded-2xl border border-[var(--border)] bg-[var(--bg-base)] transition-all duration-200 focus-within:border-[var(--primary)] focus-within:shadow-[0_0_0_3px_var(--primary-light)]">
          <svg lucideLock class="w-5 h-5 text-[var(--text-muted)] flex-shrink-0"></svg>
          <input type="password" [ngModel]="password()" (ngModelChange)="password.set($event)" placeholder="كلمة المرور" class="flex-1 bg-transparent outline-none text-[15px] font-semibold text-[var(--text-primary)] placeholder:text-[var(--text-muted)] placeholder:font-normal">
        </div>

        @if (error()) {
          <div class="bg-red-50 dark:bg-red-950/20 border border-red-200 dark:border-red-800 rounded-2xl px-4 py-3">
            <p class="text-sm text-red-600 dark:text-red-400 font-semibold text-center">{{ error() }}</p>
          </div>
        }

        <button (click)="submit()" [disabled]="isLoading()" class="flex items-center justify-center gap-2 w-full py-4 rounded-2xl bg-[var(--primary)] text-white font-bold text-[15px] hover:bg-[var(--primary-hover)] active:scale-[0.98] transition-all duration-150 shadow-lg disabled:opacity-60 disabled:cursor-not-allowed">
          @if (isLoading()) {
            <svg class="animate-spin w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
          } @else {
            <svg lucideUserPlus class="w-5 h-5"></svg>
          }
          <span>{{ isLoading() ? 'جاري إنشاء الحساب...' : 'إنشاء حساب' }}</span>
        </button>

        <div class="text-center">
          <span class="text-sm text-[var(--text-muted)]">لديك حساب بالفعل؟ </span>
          <a routerLink="/login" class="text-sm font-bold text-[var(--primary)] hover:text-[var(--primary-hover)] transition-colors">تسجيل الدخول</a>
        </div>
      </div>
    </div>
    <p class="text-center text-xs text-[var(--text-muted)] mt-6">© 2026 رحلة. جميع الحقوق محفوظة.</p>
  </div>
</div>
