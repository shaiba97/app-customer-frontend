<div dir="rtl" class="h-dvh w-full bg-[var(--bg-base)] flex flex-col"
     [style.paddingTop]="capService.isNative() ? 'var(--safe-top)' : undefined">

  <!-- ==================== DESKTOP TOP BAR ==================== -->
  <app-navbar class="hidden md:block flex-shrink-0" />

  <!-- ==================== CONTENT (shared) ==================== -->
  <main class="flex-1 overflow-y-auto md:pb-0"
        [style.paddingBottom]="capService.isNative() ? 'calc(88px + var(--safe-bottom))' : '88px'"
        style="overscroll-behavior-y: auto; touch-action: pan-y; -webkit-overflow-scrolling: touch; scroll-behavior: smooth;">
    <router-outlet />
  </main>

  <!-- ==================== MOBILE BOTTOM NAV ==================== -->
  <nav class="md:hidden sticky bottom-0 left-0 right-0 z-[99999]
              flex items-center justify-around px-2
              bg-[var(--bg-card)] border-t border-[var(--border)]
              shadow-[0_-2px_12px_rgba(0,0,0,0.05)]"
       [style.paddingBottom]="capService.isNative() ? 'calc(4px + var(--safe-bottom))' : '4px'"
       [style.paddingTop]="'4px'">

  <a routerLink="/home"
    class="flex flex-col items-center gap-0.5 py-1.5 px-4 rounded-xl transition-all duration-200 no-underline"
    [class.bg-[var(--primary-light)]]="isHomeActive()"
    [class.text-[var(--primary)]]="isHomeActive()"
    [class.text-[var(--text-muted)]]="!isHomeActive()">
    <svg lucideHome class="w-5 h-5 transition-colors duration-200"></svg>
    <span class="text-[10px] font-bold transition-colors duration-200">الرئيسية</span>
  </a>

  <a (click)="goToBookings()"
    class="flex flex-col items-center gap-0.5 py-1.5 px-4 rounded-xl transition-all duration-200 no-underline cursor-pointer"
    [class.bg-[var(--primary-light)]]="isBookingsActive()"
    [class.text-[var(--primary)]]="isBookingsActive()"
    [class.text-[var(--text-muted)]]="!isBookingsActive()">
    <svg lucideCalendarClock class="w-5 h-5 transition-colors duration-200"></svg>
    <span class="text-[10px] font-bold transition-colors duration-200">حجوزاتي</span>
  </a>

  <a (click)="goToNotifs()"
    class="flex flex-col items-center gap-0.5 py-1.5 px-4 rounded-xl transition-all duration-200 no-underline cursor-pointer relative"
    [class.bg-[var(--primary-light)]]="isNotifsActive()"
    [class.text-[var(--primary)]]="isNotifsActive()"
    [class.text-[var(--text-muted)]]="!isNotifsActive()">
    <div class="relative">
      <svg lucideBell class="w-5 h-5 transition-colors duration-200"></svg>
      @if (isLoggedIn() && unreadCount() > 0) {
        <span class="absolute -top-1.5 -right-1.5 min-w-[16px] h-[16px] rounded-full
                     bg-red-500 text-white text-[8px] font-extrabold
                     flex items-center justify-center px-0.5">
          @if (unreadCount() > 99) { +99 } @else {
            {{ toArabicNum(unreadCount()) }}
          }
        </span>
      }
    </div>
    <span class="text-[10px] font-bold transition-colors duration-200">الإشعارات</span>
  </a>

  <a (click)="goToBlog()"
    class="flex flex-col items-center gap-0.5 py-1.5 px-4 rounded-xl transition-all duration-200 no-underline cursor-pointer"
    [class.bg-[var(--primary-light)]]="isBlogActive()"
    [class.text-[var(--primary)]]="isBlogActive()"
    [class.text-[var(--text-muted)]]="!isBlogActive()">
    <svg lucideNewspaper class="w-5 h-5 transition-colors duration-200"></svg>
    <span class="text-[10px] font-bold transition-colors duration-200">المدونة</span>
  </a>

  <a routerLink="/profile"
    class="flex flex-col items-center gap-0.5 py-1.5 px-4 rounded-xl transition-all duration-200 no-underline"
    [class.bg-[var(--primary-light)]]="isProfileActive()"
    [class.text-[var(--primary)]]="isProfileActive()"
    [class.text-[var(--text-muted)]]="!isProfileActive()">
    <svg lucideUser class="w-5 h-5 transition-colors duration-200"></svg>
    <span class="text-[10px] font-bold transition-colors duration-200">حسابي</span>
  </a>
  </nav>

</div>
